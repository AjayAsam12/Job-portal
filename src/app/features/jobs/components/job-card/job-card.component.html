<div class="job-card">
    <img [src]="job.companyLogo" width="50" />
  
    <h3>{{ job.title }}</h3>
    <p>{{ job.companyName }}</p>
    <p>{{ job.location }}</p>
  
    <div>
      <span *ngFor="let tag of job.tags">{{ tag }}</span>
    </div>
  
    <button (click)="goToDetail()">View Details</button>
  </div>
